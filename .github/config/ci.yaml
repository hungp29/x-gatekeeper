apps:
  - name: x-gatekeeper
    description: x-gatekeeper HTTP service
    cicd:
      workflows:
        jobs:
          build-and-unit-test:
            go-version: '1.25.0'
          containerize-and-package:
            dockerfile-path: 'Dockerfile'
            registry: ghcr.io
            image-name: hungp29/x-gatekeeper
            chart-path: charts/x-gatekeeper
          create-deployment-pr:
            file: x-gatekeeper.yaml
            